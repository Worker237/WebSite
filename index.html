<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>worker237</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --accent1:#8b5cf6;
  --accent2:#a855f7;
  --accent3:#c084fc;
  --text:white;
  --muted:rgba(255,255,255,0.65);
}

@property --accent1{
  syntax:"<color>";
  inherits:true;
  initial-value:#8b5cf6;
}

@property --accent2{
  syntax:"<color>";
  inherits:true;
  initial-value:#a855f7;
}

@property --accent3{
  syntax:"<color>";
  inherits:true;
  initial-value:#c084fc;
}

html{
  width:100%;
  min-height:100%;
  background:#050505;
}

body{
  width:100%;
  min-height:100svh;
  overflow-x:hidden;
  overflow-y:auto;
  background:#050505;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:white;
  position:relative;
  isolation:isolate;
  transition:
    --accent1 .65s ease,
    --accent2 .65s ease,
    --accent3 .65s ease,
    background-color .65s ease;
}

body.theme-purple{
  --accent1:#8b5cf6;
  --accent2:#a855f7;
  --accent3:#c084fc;
}

body.theme-cyan{
  --accent1:#22d3ee;
  --accent2:#06b6d4;
  --accent3:#67e8f9;
}

body.theme-red{
  --accent1:#ef4444;
  --accent2:#f97316;
  --accent3:#fb7185;
}

body.theme-green{
  --accent1:#22c55e;
  --accent2:#10b981;
  --accent3:#86efac;
}

.card,
.card::before,
.btn,
.enter-btn,
.bar-visual,
.music-box,
.pronouns,
.stat,
.clock,
.status-pill,
.theme-switcher button,
.music-controls button,
.mini-btn{
  transition:
    background .65s ease,
    background-color .65s ease,
    border-color .65s ease,
    box-shadow .65s ease,
    color .65s ease,
    transform .18s ease,
    opacity .3s ease;
}

/* CLICK TO ENTER SCREEN */

.enter-screen{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top, rgba(139,92,246,0.28), transparent 36%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.08), transparent 42%),
    rgba(0,0,0,0.92);
  transition:opacity .45s ease, visibility .45s ease;
}

.enter-screen.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.enter-box{
  text-align:center;
  padding:32px;
  width:min(92vw,420px);
  border-radius:28px;
  background:rgba(10,10,10,0.68);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 24px 80px rgba(0,0,0,0.65);
  animation:enterFloat 4s ease-in-out infinite;
}

.enter-box h2{
  font-size:2.15rem;
  letter-spacing:-0.05em;
  margin-bottom:8px;
}

.enter-box p{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:22px;
}

.enter-btn{
  width:100%;
  padding:15px 18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.12);
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  color:white;
  font-weight:700;
  cursor:pointer;
  font-size:1rem;
  position:relative;
  overflow:hidden;
}

.enter-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:80%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform:skewX(-20deg);
  animation:buttonShine 3.5s ease-in-out infinite;
}

.enter-btn:hover{
  transform:translateY(-2px);
}

/* BACKGROUND LAYERS */

.video-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(16px) brightness(0.32);
  transform:scale(1.1);
  z-index:0;
  pointer-events:none;
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.1), transparent 36%),
    rgba(0,0,0,0.54);
  z-index:1;
  pointer-events:none;
}

.noise{
  position:fixed;
  inset:0;
  opacity:.035;
  pointer-events:none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.35) 0 1px, transparent 1px),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.22) 0 1px, transparent 1px);
  background-size:24px 24px, 31px 31px;
  z-index:2;
}

.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
  background:linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 2px);
  background-size:100% 4px;
  z-index:3;
}

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:4;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation:floatParticle linear infinite;
}

/* MAIN PAGE */

.app{
  width:100%;
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:92px 20px 28px;
  opacity:0;
  transform:translateY(22px) scale(.97);
  animation:intro .8s ease forwards;
  position:relative;
  z-index:10;
}

.card{
  width:430px;
  max-width:100%;
  padding:35px;
  border-radius:32px;
  background:rgba(10,10,10,0.48);
  -webkit-backdrop-filter:blur(22px);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.55);
  transform-style:preserve-3d;
  contain:layout paint;
  animation:cardIdleFloat 6s ease-in-out infinite;
}

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  padding:2px;
  background:linear-gradient(120deg, var(--accent1), var(--accent2), var(--accent3), var(--accent1));
  background-size:300% 300%;
  animation:borderMove 8s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

.avatar-wrap{
  width:fit-content;
  margin:auto;
  position:relative;
}

.avatar-wrap::after{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.18);
  animation:avatarRing 2.8s ease-out infinite;
  pointer-events:none;
}

.avatar-glow{
  position:absolute;
  inset:-15px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
  filter:blur(12px);
}

.avatar{
  width:115px;
  height:115px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  position:relative;
  animation:avatarPulse 4s ease-in-out infinite;
}

h1{
  text-align:center;
  font-size:2.5rem;
  margin-top:18px;
  font-weight:800;
  letter-spacing:-0.05em;
}

.tagline{
  text-align:center;
  color:var(--muted);
  margin-top:5px;
  margin-bottom:18px;
}

.worker-quote{
  text-align:center;
  font-style:italic;
  min-height:24px;
  margin-bottom:15px;
}

.pronouns{
  width:fit-content;
  margin:0 auto 18px;
  padding:7px 15px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  font-size:.82rem;
}

.bio{
  text-align:center;
  line-height:1.7;
  color:rgba(255,255,255,0.78);
  min-height:50px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:22px;
}

.stat{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:18px;
  padding:15px;
  text-align:center;
}

.stat p{
  color:var(--muted);
  font-size:.78rem;
}

.buttons{
  margin-top:20px;
}

.btn{
  display:block;
  text-align:center;
  text-decoration:none;
  color:white;
  padding:15px;
  border-radius:18px;
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  font-weight:600;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:80%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform:skewX(-20deg);
  animation:buttonShine 4s ease-in-out infinite;
}

.music-box{
  margin-top:20px;
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.06);
  animation:musicGlow 5s ease-in-out infinite;
}

.music-title{
  text-align:center;
  margin-bottom:14px;
}

.music-controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}

button{
  border:none;
  cursor:pointer;
  font:inherit;
}

.music-controls button,
.theme-switcher button,
.mini-btn{
  background:rgba(255,255,255,0.08);
  color:white;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
}

.visualizer{
  height:55px;
  display:flex;
  align-items:end;
  justify-content:center;
  gap:4px;
  margin-top:16px;
}

.bar-visual{
  width:7px;
  height:18px;
  border-radius:999px;
  background:linear-gradient(180deg, var(--accent3), var(--accent1));
}

.topbar{
  position:fixed;
  top:18px;
  left:18px;
  right:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:20;
}

.right-tools{
  display:flex;
  align-items:center;
  gap:12px;
}

.clock,
.status-pill{
  padding:10px 14px;
  border-radius:999px;
  background:rgba(0,0,0,0.35);
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
}

.status-pill{
  display:flex;
  align-items:center;
  gap:10px;
  animation:statusBreath 3s ease-in-out infinite;
}

.presence-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 12px #22c55e;
}

.theme-switcher{
  display:flex;
  gap:8px;
}

.terminal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:100;
  opacity:0;
  visibility:hidden;
  transition:opacity .18s ease, visibility .18s ease;
}

.terminal.show{
  opacity:1;
  visibility:visible;
}

.terminal-top{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.terminal-body{
  position:absolute;
  inset:60px 15px 15px 15px;
  overflow:hidden;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.matrix{
  position:absolute;
  inset:0;
  font-family:monospace;
  color:#7dff9d;
}

.matrix span{
  position:absolute;
  top:-80px;
  animation:fall linear infinite;
}

@media (hover:hover) and (pointer:fine){
  .btn:hover{
    transform:translateY(-3px);
  }

  .stat:hover{
    transform:translateY(-4px);
    border-color:rgba(255,255,255,0.16);
    background:rgba(255,255,255,0.07);
  }

  .theme-switcher button:hover,
  .music-controls button:hover,
  .mini-btn:hover{
    transform:translateY(-2px);
  }
}

@keyframes intro{
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes borderMove{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

@keyframes floatParticle{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

@keyframes fall{
  from{transform:translateY(0);}
  to{transform:translateY(115vh);}
}

@keyframes enterFloat{
  0%,100%{
    translate:0 0;
  }

  50%{
    translate:0 -8px;
  }
}

@keyframes cardIdleFloat{
  0%,100%{
    translate:0 0;
  }

  50%{
    translate:0 -8px;
  }
}

@keyframes avatarPulse{
  0%,100%{
    box-shadow:0 0 0 rgba(255,255,255,0);
  }

  50%{
    box-shadow:0 0 28px rgba(255,255,255,0.16);
  }
}

@keyframes avatarRing{
  0%{
    opacity:.55;
    transform:scale(.9);
  }

  100%{
    opacity:0;
    transform:scale(1.25);
  }
}

@keyframes buttonShine{
  0%,65%{
    left:-120%;
  }

  100%{
    left:140%;
  }
}

@keyframes musicGlow{
  0%,100%{
    box-shadow:0 0 0 rgba(139,92,246,0);
  }

  50%{
    box-shadow:0 0 35px color-mix(in srgb, var(--accent1) 28%, transparent);
  }
}

@keyframes statusBreath{
  0%,100%{
    box-shadow:0 0 0 rgba(34,197,94,0);
  }

  50%{
    box-shadow:0 0 22px rgba(34,197,94,0.18);
  }
}

/* MOBILE */

@media (max-width:768px), (hover:none), (pointer:coarse){
  .video-bg{
    display:block;
    filter:blur(12px) brightness(0.28);
    transform:scale(1.1);
  }

  .noise,
  .scanlines,
  .particles{
    display:none;
  }

  .app{
    align-items:flex-start;
    padding:118px 14px 22px;
    animation:intro .45s ease forwards;
  }

  .topbar{
    top:12px;
    left:12px;
    right:12px;
    align-items:flex-start;
    gap:10px;
  }

  .right-tools{
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }

  .clock,
  .status-pill{
    -webkit-backdrop-filter:none;
    backdrop-filter:none;
    background:rgba(0,0,0,0.5);
  }

  .theme-switcher{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
  }

  .theme-switcher button{
    padding:8px 10px;
    font-size:.78rem;
  }

  .card{
    width:100%;
    padding:24px 18px;
    border-radius:26px;
    -webkit-backdrop-filter:none;
    backdrop-filter:none;
    background:rgba(10,10,10,0.72);
    box-shadow:0 14px 38px rgba(0,0,0,0.45);
    transform:none !important;
    animation:none;
  }

  .card::before{
    animation:none;
    background:linear-gradient(135deg, var(--accent1), transparent, var(--accent2));
  }

  .avatar-glow{
    filter:none;
    opacity:.5;
  }

  .avatar{
    width:96px;
    height:96px;
    animation:none;
  }

  .avatar-wrap::after,
  .btn::before,
  .enter-btn::before{
    display:none;
  }

  .music-box,
  .status-pill,
  .enter-box{
    animation:none;
  }

  h1{
    font-size:2.05rem;
  }

  .tagline{
    font-size:.93rem;
  }

  .stats{
    gap:8px;
  }

  .stat{
    padding:12px 8px;
  }

  .music-controls{
    flex-wrap:wrap;
  }

  #volumeSlider{
    width:140px;
  }

  .terminal{
    display:none;
  }
}

@media (prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    scroll-behavior:auto !important;
    transition-duration:.001ms !important;
  }
}
</style>
</head>

<body class="theme-purple">

<div class="enter-screen" id="enterScreen">
  <div class="enter-box">
    <h2>worker237</h2>
    <p>click to enter</p>

  </div>
</div>

<video class="video-bg" autoplay muted loop playsinline preload="auto">
  <source src="Backround.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="noise"></div>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>

<div class="terminal" id="terminalOverlay" aria-hidden="true">
  <div class="terminal-top">

<div class="app">
  <div class="topbar">

    <div class="right-tools">
      <div class="status-pill">
        <span class="presence-dot"></span>
        <span>online</span>

      <div class="theme-switcher">
        <button data-theme="purple">purple</button>
        <button data-theme="cyan">cyan</button>
        <button data-theme="red">red</button>
        <button data-theme="green">green</button>
      </div>
    </div>
  </div>

  <div class="card" id="profileCard">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <img class="avatar" src="Avatar.png" alt="worker237 avatar" decoding="async">
    </div>

    <h1>worker237</h1>

    <div class="tagline">
      Coder ・ Lazy ass ・ Polish
    </div>

    <div class="worker-quote" id="workerQuote"></div>

      he / him
    </div>

      <div class="stat">
        <h2>24/7</h2>
        <p>online</p>
      </div>

        <h3>Message Me!</h3>
        <p>worker237</p>

<audio id="bgMusic" loop preload="auto"></audio>

<script>
const quotes = [
  "Rock Rocks! - linkin park",
  "built different after midnight",
  "Damn?",
  "Feeling like doing something.",
  "I'm amlost alwaws open to chat!"
];

const bios = [
  "Gamer with goals.",
  "I love linux.",
  "Rock's the best!."
];

const startupMessages = [
  "syncing aesthetics...",
  "loading visuals...",
  "warming up the matrix...",
  "building profile...",
  "connecting vibes..."
];

const tracks = [
  {
    name:"American Idiot",
    file:"AmericanIdiot.mp3"
  },
  {
    name:"This Love",
    file:"ThisLove.mp3"
  },
  {
    name:"Want To Love",
    file:"WantToLove.mp3"
  },
  {
    name:"Somewhere i Belong",
    file:"SomewhereIBelong.mp3"
  },
  {
    name:"I Hate Everything",
    file:"IHateEverything.mp3"
  },
  {
    name:"Heavy Is The Crown",
    file:"HeavyIsTheCrown.mp3"
  },
  {
    name:"DLZ",
    file:"DLZ.mp3"
  },
  {
    name:"Crawling",
    file:"Crawling.mp3"
  }
];

const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const coarsePointer = window.matchMedia("(hover: none), (pointer: coarse)").matches;
const smallScreen = window.matchMedia("(max-width: 768px)").matches;
const liteMode = prefersReducedMotion || coarsePointer || smallScreen;

console.log(startupMessages[Math.floor(Math.random() * startupMessages.length)]);

function pickRandom(list){
  return list[Math.floor(Math.random() * list.length)];
}

function typeText(el, text, speed = 30){
  el.textContent = "";

  if(liteMode || prefersReducedMotion){
    el.textContent = text;
    return;
  }

  let i = 0;

  const interval = window.setInterval(() => {
    el.textContent += text.charAt(i);
    i++;

    if(i >= text.length){
      window.clearInterval(interval);
    }
  }, speed);
}

const quoteEl = document.getElementById("workerQuote");
const bioEl = document.getElementById("bioText");

typeText(quoteEl, `"${pickRandom(quotes)}"`);

window.setTimeout(() => {
  typeText(bioEl, pickRandom(bios), 20);
}, liteMode ? 0 : 900);

const clock = document.getElementById("clock");

function updateClock(){
  const options = liteMode
    ? { hour:"2-digit", minute:"2-digit" }
    : { hour:"2-digit", minute:"2-digit", second:"2-digit" };

  clock.textContent = new Date().toLocaleTimeString([], options);
}

updateClock();

window.setInterval(updateClock, liteMode ? 60000 : 1000);

const particles = document.getElementById("particles");

function buildParticles(){
  if(liteMode) return;

  const fragment = document.createDocumentFragment();
  const amount = 28;

  for(let i = 0; i < amount; i++){
    const p = document.createElement("div");

    p.className = "particle";
    p.style.left = `${Math.random() * 100}vw`;
    p.style.animationDuration = `${9 + Math.random() * 12}s`;
    p.style.animationDelay = `${Math.random() * -12}s`;
    p.style.opacity = String(Math.random() * 0.8);

    fragment.appendChild(p);
  }

  particles.appendChild(fragment);
}

buildParticles();

const player = document.getElementById("bgMusic");
const musicTitle = document.getElementById("musicTitle");
const randomTrack = pickRandom(tracks);

player.src = randomTrack.file;
player.volume = 1;
player.muted = false;

musicTitle.textContent = `now playing: ${randomTrack.name}`;

const enterScreen = document.getElementById("enterScreen");
const enterBtn = document.getElementById("enterBtn");

let musicStarted = false;
let muted = false;

async function startMusic(){
  try{
    await player.play();
    musicStarted = true;
    musicTitle.textContent = `now playing: ${randomTrack.name}`;
  }catch(error){
    musicStarted = false;
    musicTitle.textContent = `click enter to start: ${randomTrack.name}`;
    console.warn("Audio playback was blocked:", error);
  }
}

enterBtn.addEventListener("click", async () => {
  player.muted = false;
  muted = false;

  await startMusic();

  enterScreen.classList.add("hidden");
  document.getElementById("toggleMusic").textContent = "🔊 Mute";
});

const toggleMusic = document.getElementById("toggleMusic");

toggleMusic.addEventListener("click", async () => {
  if(!musicStarted){
    await startMusic();
  }

  muted = !muted;
  player.muted = muted;
  toggleMusic.textContent = muted ? "🔇 Unmute" : "🔊 Mute";
});

document.getElementById("volumeSlider").addEventListener("input", (e) => {
  player.volume = Number(e.target.value) / 100;
});

const visualizer = document.getElementById("visualizer");
const visualizerBars = liteMode ? 10 : 20;
const visualizerFragment = document.createDocumentFragment();

for(let i = 0; i < visualizerBars; i++){
  const bar = document.createElement("div");

  bar.className = "bar-visual";
  bar.style.height = `${liteMode ? 18 + (i % 4) * 5 : 12}px`;

  visualizerFragment.appendChild(bar);
}

visualizer.appendChild(visualizerFragment);

const bars = Array.from(document.querySelectorAll(".bar-visual"));
const profileCard = document.getElementById("profileCard");

if(!liteMode){
  window.setInterval(() => {
    if(document.hidden) return;

    for(const bar of bars){
      bar.style.height = `${Math.random() * 42 + 8}px`;
    }
  }, 180);
}

document.querySelectorAll("[data-theme]").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.body.classList.remove(
      "theme-purple",
      "theme-cyan",
      "theme-red",
      "theme-green"
    );

    document.body.classList.add(`theme-${btn.dataset.theme}`);
  });
});

if(!liteMode && window.matchMedia("(hover: hover) and (pointer: fine)").matches){
  let tiltFrame = null;

  profileCard.addEventListener("mousemove", (e) => {
    if(tiltFrame) return;

    tiltFrame = window.requestAnimationFrame(() => {
      const rect = profileCard.getBoundingClientRect();

      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;

      const rotateY = (x - 0.5) * 10;
      const rotateX = (0.5 - y) * 10;

      profileCard.style.transform =
        `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

      tiltFrame = null;
    });
  });

  profileCard.addEventListener("mouseleave", () => {
    profileCard.style.transform =
      "perspective(1000px) rotateX(0deg) rotateY(0deg)";
  });
}

let audioCtx = null;

function hoverSound(){
  if(liteMode) return;

  audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 500;
  gain.gain.value = 0.02;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.045);
}

if(!liteMode){
  document.querySelectorAll("button,.btn").forEach((el) => {
    el.addEventListener("mouseenter", hoverSound);
  });
}

const terminal = document.getElementById("terminalOverlay");
const matrix = document.getElementById("matrix");

let matrixBuilt = false;

function buildMatrix(){
  matrix.textContent = "";

  const cols = Math.min(Math.floor(window.innerWidth / 18), 90);
  const fragment = document.createDocumentFragment();

  for(let i = 0; i < cols; i++){
    const span = document.createElement("span");

    span.innerHTML = "01AF<br>▓▒░<br>1010";
    span.style.left = `${i * 18}px`;
    span.style.animationDuration = `${3 + Math.random() * 5}s`;
    span.style.animationDelay = `${Math.random() * -6}s`;

    fragment.appendChild(span);
  }

  matrix.appendChild(fragment);
  matrixBuilt = true;
}

if(!liteMode){
  document.addEventListener("keydown", (e) => {
    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c"){
      if(!matrixBuilt) buildMatrix();

      const isShowing = terminal.classList.toggle("show");
      terminal.setAttribute("aria-hidden", String(!isShowing));
    }
  });
}

document.getElementById("closeTerminal").addEventListener("click", () => {
  terminal.classList.remove("show");
  terminal.setAttribute("aria-hidden", "true");
});
</script>
